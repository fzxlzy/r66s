name: build-rockchip

permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 2'   # 每周三 04:00 北京时间（UTC 周二 20:00）

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_TAG: v25.12.4

  PLATFORM_FILE: configs/rockchip.txt
  CONFIG_FILE: configs/packages.txt

  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  SETTINGS_SH: scripts/init-settings.sh

  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 初始化环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x $FREE_DISK_SH && $FREE_DISK_SH || true
          sudo -E apt-get -qq update -y
          sudo -E apt-get -qq full-upgrade -y
          chmod +x $ENV_SH && $ENV_SH
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo timedatectl set-timezone "$TZ"
          docker image prune -a -f || true
          docker container prune -f || true
          sudo mkdir -p /workdir
          sudo chown $USER:$USER /workdir

      - name: 空间使用情况1
        if: (!cancelled())
        run: df -hT

      - name: 克隆 OpenWrt 源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          git checkout $REPO_TAG
          echo "当前源码版本："
          git describe --tags --always

      - name: 写入第三方 feeds（精简稳定版）
        run: |
          cd /workdir/openwrt
          cat >> feeds.conf.default <<'EOF'

          # OpenClash
          src-git openclash https://github.com/vernesong/OpenClash.git

          # SmartDNS / 其他常用 luci 扩展一般 feeds 自带
          EOF

      - name: 开启缓存
        uses: klever1988/cachewrtbuild@main
        with:
          ccache: 'true'
          mixkey: 'openwrt-v25.12.4-r66s'
          prefix: ${{ github.workspace }}/openwrt

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 导入配置
        run: |
          [ -f $PLATFORM_FILE ] && cat $PLATFORM_FILE >> openwrt/.config
          [ -f $CONFIG_FILE ] && cat $CONFIG_FILE >> openwrt/.config
          cd openwrt
          make defconfig

      - name: 执行自定义脚本（如存在）
        run: |
          cd openwrt
          [ -f "$GITHUB_WORKSPACE/$SETTINGS_SH" ] && chmod +x "$GITHUB_WORKSPACE/$SETTINGS_SH" && "$GITHUB_WORKSPACE/$SETTINGS_SH" || true
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 空间使用情况2
        if: (!cancelled())
        run: df -hT

      - name: 编译固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(($(nproc)+1)) thread compile"
          make -j$(($(nproc)+1)) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 空间使用情况3
        if: (!cancelled())
        run: df -hT

      - name: 整理固件文件
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          rm -f *.buildinfo *.json *.manifest sha256sums
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          ls -lh

      - name: 上传 bin 目录
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin_R66S_${{ github.run_number }}
          path: openwrt/bin

      - name: 上传固件目录
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_R66S_${{ github.run_number }}
          path: ${{ env.FIRMWARE }}

      - name: 生成发布标签
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          echo "OpenWrt 官方 v25.12.4 / rockchip / FastRhino R66S / ext4 自用稳定版" > release.txt
          echo "" >> release.txt
          echo "- 基于 OpenWrt v25.12.4" >> release.txt
          echo "- 目标设备：FastRhino R66S" >> release.txt
          echo "- 文件系统：ext4" >> release.txt
          echo "- 适合 TF 卡长期自用，支持保存配置" >> release.txt
          echo "release_tag=$(date +"%Y.%m.%d_OpenWrt_R66S")" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: 删除旧 Release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 删除旧工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 5
